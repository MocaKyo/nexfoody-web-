<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>nexfoody-web</title>
    <script>
      (function() {
        var t = localStorage.getItem('nexfoody_theme') || 'dark';
        var resolved = t === 'system'
          ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          : t;
        document.documentElement.setAttribute('data-tema', resolved);
      })();
    </script>
    <style>
      #password-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1a0a36, #0f0518);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: 'Outfit', sans-serif;
      }
      #password-screen h1 {
        color: #f5c518;
        font-size: 1.5rem;
        margin-bottom: 20px;
      }
      #password-screen input {
        padding: 12px 20px;
        border-radius: 50px;
        border: 2px solid rgba(245,197,24,0.3);
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 1rem;
        outline: none;
        width: 250px;
        text-align: center;
      }
      #password-screen input:focus {
        border-color: #f5c518;
      }
      #password-screen button {
        margin-top: 16px;
        padding: 12px 40px;
        border-radius: 50px;
        border: none;
        background: linear-gradient(135deg, #f5c518, #e6a817);
        color: #0a0414;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
      }
      #password-screen button:hover {
        opacity: 0.9;
      }
      #password-screen .error {
        color: #ef4444;
        margin-top: 12px;
        font-size: 0.85rem;
      }
      #password-screen.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="password-screen">
      <h1>🔒 NexFoody</h1>
      <input type="password" id="password-input" placeholder="Digite a senha" />
      <button onclick="checkPassword()">Entrar</button>
      <p class="error" id="password-error" style="display:none">Senha incorreta</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const PASSWORD = '262508';
      const screen = document.getElementById('password-screen');
      const input = document.getElementById('password-input');
      const error = document.getElementById('password-error');

      if (sessionStorage.getItem('nexfoody_access')) {
        screen.classList.add('hidden');
      }

      function checkPassword() {
        if (input.value === PASSWORD) {
          sessionStorage.setItem('nexfoody_access', '1');
          screen.classList.add('hidden');
        } else {
          error.style.display = 'block';
          input.value = '';
        }
      }

      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
      });
    </script>
  </body>
</html>
